backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "content"
    label: "Content"
    files:
      - name: "main_content"
        label: "Main iframe content"
        file: "content.json"
        format: "json"
        fields:
          - label: "Body"
            name: "body"
            widget: "markdown"
